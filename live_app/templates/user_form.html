{% extends "base.html" %}
{% block content %}
<header class="page-head narrow">
  <div>
    <p class="eyebrow">Access</p>
    <h1>Create Client Login</h1>
    <p>Use this to give a client their own dashboard credentials.</p>
  </div>
</header>

<form method="post" class="builder-form">
  <label>Email
    <input name="email" type="email" placeholder="client@company.com" required>
  </label>
  <label>Password
    <input name="password" type="text" placeholder="Minimum 8 characters" required>
  </label>
  <label>Role
    <select name="role">
      <option value="client_viewer">Client viewer</option>
      <option value="client_admin">Client admin</option>
      <option value="admin">APP.AI admin</option>
    </select>
  </label>
  <label>Project access
    <select name="project_id">
      <option value="0">All admin projects only</option>
      {% for project in projects %}
      <option value="{{ project.id }}">{{ project.name }}</option>
      {% endfor %}
    </select>
  </label>
  <button class="primary" type="submit">Create Login</button>
</form>
{% endblock %}
